<!-- viewBox cropped tight around the Ab + squiggle so the content
     fills the rasterized slot in the tray / sidebar edge-to-edge.
     Strokes thickened so the mark holds visual weight at tray
     sizes — at small scales a thinner stroke renders sub-pixel
     and disappears, which is what made earlier versions look
     light compared to neighbors. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 36 256 220">
  <!-- Adwaita-style spell-check mark: blue "Ab" with a squiggly
       underline. Transparent background so the icon picks up
       whichever surface it sits on (tray, prefs sidebar, launcher
       tile). -->
  <text x="128" y="178"
        font-family="DejaVu Serif, Liberation Serif, Noto Serif, Times New Roman, serif"
        font-size="190"
        font-weight="900"
        fill="#4a86c0"
        text-anchor="middle">Ab</text>
  <!-- Spell-check squiggle: 3 oscillations under the letters. -->
  <path d="M 14 224 q 19 -18 38 0 q 19 18 38 0 q 19 -18 38 0 q 19 18 38 0 q 19 -18 38 0 q 19 18 38 0"
        fill="none"
        stroke="#4a86c0"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
