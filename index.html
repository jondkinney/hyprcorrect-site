<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hyprcorrect — Keyboard-driven desktop spelling correction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <header>
    <h1>Hyprcorrect</h1>
    <p>
      <span class="eyebrow">
        <span class="dot"></span>
        <!-- The version chip is bumped automatically by
             release-update-site.yml on every published GitHub Release.
             Keep the data-hyprcorrect-version anchor untouched; reword
             the surrounding copy freely. -->
        <span data-hyprcorrect-version>v0.1.0</span> · MIT / Apache-2.0
      </span>
    </p>
  </header>
  <main>
    <p>Press a hotkey. The word you just typed is checked and fixed in place, in any focused app — including terminals.</p>
  </main>
</body>
</html>
